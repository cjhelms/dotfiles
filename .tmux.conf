new
neww -n shell
split-window -v
split-window -h
resize-pane -D 10
kill-window -t 0

unbind C-b
set-option -g prefix C-space
bind C-space send-prefix

set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi V send -X select-line
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel 'xclip -in -selection clipboard'
bind-key -T copy-mode-vi _ send -X start-of-line

set -g status on
set -g status-position bottom
set -g status-interval 5
set -g status-justify left
set -g status-style bg='#1c1c1c',fg='#9e9e9e'
set -g status-left-length 40
set -g status-left '#[fg=#1c1c1c,bg=#af875f,bold] #S #[fg=#af875f,bg=#1c1c1c] '
set -g status-right-length 80
set -g status-right '#[fg=#5f87af]%Y-%m-%d #[fg=#d7af87]%H:%M '
set -g window-status-format '#[fg=#767676] #I:#W '
set -g window-status-current-format '#[fg=#1c1c1c,bg=#d7af87,bold] #I:#W '
set -g window-status-separator ''
set -g pane-border-style fg='#767676'
set -g pane-active-border-style fg='#af875f'
set -g message-style bg='#af875f',fg='#1c1c1c'
set -g message-command-style bg='#5f87af',fg='#1c1c1c'

setw -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection

set -g base-index 1
setw -g pane-base-index 1

set -g display-panes-time 3000

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r c-h resize-pane -L 1
bind -r c-j resize-pane -D 1
bind -r c-k resize-pane -U 1
bind -r c-l resize-pane -R 1

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

bind-key C-r source-file ~/.tmux.conf \; display "Config reloaded!"
bind-key C-n new-window \; split-window -v \; split-window -h \; resize-pane -D 10
bind-key x kill-pane
bind-key C-x kill-window
bind-key X kill-server

set -sg escape-time 0
